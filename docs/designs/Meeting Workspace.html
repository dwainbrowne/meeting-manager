  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

s:center;gap:10px;margin-bottom:3px\">\n          <div style=\"{{ selectedEntity.avatarStyle }}\">{{ selectedEntity.initials }}<\u002Fdiv>\n          <span style=\"font-size:17px;font-weight:700;letter-spacing:-0.01em\">{{ selectedEntity.name }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#aab3c1;padding-left:42px\">{{ selectedEntity.meta }} · {{ meetingsCountLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:10px 12px 16px\">\n        <sc-for list=\"{{ meetings }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ m.onSelect }}\" style=\"{{ m.rowStyle }}\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:5px\">\n              <span style=\"font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#2f6bdd\">{{ m.dateLabel }}<\u002Fspan>\n              <span style=\"{{ m.openPillStyle }}\">{{ m.openLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:15px;font-weight:600;line-height:1.3;color:#222b3a;margin-bottom:7px;letter-spacing:-0.01em\">{{ m.title }}<\u002Fdiv>\n            <div style=\"font-size:12px;color:#aab3c1\">{{ m.attendeesLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <div style=\"margin-top:8px;padding:16px 14px;border:1.5px dashed #cdd7e3;border-radius:12px;text-align:center;cursor:pointer;background:#f5f8fb\" style-hover=\"background:#eef3fa;border-color:#bcccde\">\n          <div style=\"display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:#5d6b80\">\n            <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2f6bdd\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 3v12M7 10l5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n            Paste or drop old notes\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#aab3c1;margin-top:3px\">AI will structure them into a meeting<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== PANE 3 : MEETING DETAIL ===== -->\n    <main style=\"flex:1 1 auto;min-width:440px;background:#eaeef3;overflow-y:auto\">\n      <div style=\"max-width:760px;margin:0 auto;padding:34px 40px 64px\">\n        <div style=\"background:#fff;border:1px solid #e4e9f0;border-radius:16px;padding:40px 44px;box-shadow:0 1px 3px rgba(30,50,90,.05)\">\n\n          <div style=\"display:flex;align-items:center;gap:9px;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#2f6bdd;margin-bottom:14px\">\n            <span>{{ selectedMeeting.dateLabel }}<\u002Fspan>\n            <span style=\"color:#c8d2e0\">·<\u002Fspan>\n            <span style=\"color:#aab3c1;font-weight:500;text-transform:none;letter-spacing:0\">{{ selectedEntity.name }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <h1 style=\"font-size:31px;font-weight:800;line-height:1.18;letter-spacing:-0.025em;margin:0 0 18px;color:#16203a;text-wrap:pretty\">{{ selectedMeeting.title }}<\u002Fh1>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding-bottom:24px;margin-bottom:28px;border-bottom:1px solid #eef2f7\">\n            <div style=\"display:flex;align-items:center;gap:8px\">\n              <div style=\"{{ selectedMeeting.avatarsStyle }}\">\n                <sc-for list=\"{{ selectedMeeting.attendeeAvatars }}\" as=\"av\" hint-placeholder-count=\"3\">\n                  <div style=\"{{ av.style }}\">{{ av.initials }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <span style=\"font-size:13px;color:#76808f\">{{ selectedMeeting.attendeesLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <button style=\"display:flex;align-items:center;gap:9px;height:44px;padding:0 20px;border:1px solid #cfe0fb;border-radius:12px;background:linear-gradient(180deg,#eff5fe,#e1ecfd);color:#2357c4;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer\" style-hover=\"background:linear-gradient(180deg,#e7f0fd,#d5e5fc)\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"animation:twinkle 2.4s ease-in-out infinite\"><path d=\"M12 2l1.5 6.1L19.5 10l-6 1.5L12 18l-1.5-6.5L4.5 10l6-1.9z\"><\u002Fpath><path d=\"M19 14l.7 2.6L22 17l-2.3.6L19 20l-.7-2.4L16 17l2.3-.4z\"><\u002Fpath><\u002Fsvg>\n              Summarize with AI\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <div style=\"font-size:11px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:#a6b0bf;margin-bottom:12px\">Executive summary<\u002Fdiv>\n          <div style=\"font-size:15.5px;line-height:1.68;color:#3c4658\">\n            <sc-for list=\"{{ selectedMeeting.summary }}\" as=\"para\" hint-placeholder-count=\"3\">\n              <p style=\"margin:0 0 15px\">{{ para }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin:34px 0 14px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:0.09em;text-transform:uppercase;color:#a6b0bf\">Notes<\u002Fdiv>\n            <button style=\"display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid #e4e9f0;border-radius:9px;background:#f5f8fb;color:#515c6e;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer\" style-hover=\"background:#eaf0f7\">\n              <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#2f6bdd\" stroke-width=\"2.2\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n              Add note\n            <\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ selectedMeeting.notes }}\" as=\"note\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;gap:11px;padding:13px 15px;background:#f5f8fb;border:1px solid #eef2f7;border-radius:11px\">\n                <div style=\"width:6px;height:6px;border-radius:50%;background:#9fb4d6;margin-top:8px;flex:none\"><\u002Fdiv>\n                <div style=\"font-size:14px;line-height:1.6;color:#43505f\">{{ note }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n\n    <!-- ===== PANE 4 : ACTION ITEMS ===== -->\n    <aside style=\"width:344px;flex:0 1 344px;min-width:300px;background:#f1f4f8;border-left:1px solid #e4e9f0;display:flex;flex-direction:column;min-height:0\">\n      <div style=\"flex:none;padding:18px 20px 15px;border-bottom:1px solid #e4e9f0\">\n        <div style=\"font-size:15px;font-weight:700;margin-bottom:11px;letter-spacing:-0.01em\">Action items<\u002Fdiv>\n        <div style=\"display:flex;gap:8px\">\n          <div style=\"flex:1;background:#fff;border:1px solid #e8edf3;border-radius:10px;padding:9px 12px\">\n            <div style=\"font-size:22px;font-weight:800;color:#2f6bdd;line-height:1\">{{ openCount }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#aab3c1;font-weight:500;margin-top:2px\">Open<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;background:#fff;border:1px solid #e8edf3;border-radius:10px;padding:9px 12px\">\n            <div style=\"font-size:22px;font-weight:800;color:#2f9e6f;line-height:1\">{{ completedCount }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#aab3c1;font-weight:500;margin-top:2px\">Completed<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;overflow-y:auto;padding:8px 14px 20px\">\n        <sc-for list=\"{{ actionGroups }}\" as=\"grp\" hint-placeholder-count=\"3\">\n          <div style=\"margin-top:14px\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:8px;padding:0 2px\">\n              <div style=\"{{ grp.avatarStyle }}\">{{ grp.initials }}<\u002Fdiv>\n              <div style=\"min-width:0\">\n                <div style=\"font-size:13.5px;font-weight:600;color:#222b3a;line-height:1.2\">{{ grp.person }}<\u002Fdiv>\n                <div style=\"font-size:11px;color:#aab3c1\">{{ grp.role }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:7px\">\n              <sc-for list=\"{{ grp.items }}\" as=\"item\" hint-placeholder-count=\"2\">\n                <div onclick=\"{{ item.onToggle }}\" style=\"display:flex;gap:11px;padding:11px 13px;background:#fff;border:1px solid #e8edf3;border-radius:11px;cursor:pointer\" style-hover=\"border-color:#c4d3e8\">\n                  <div style=\"{{ item.boxStyle }}\">\n                    <sc-if value=\"{{ item.completed }}\" hint-placeholder-val=\"{{ true }}\">\n                      <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"3.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"{{ item.textStyle }}\">{{ item.text }}<\u002Fdiv>\n                    <div style=\"{{ item.statusStyle }}\">{{ item.statusLabel }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Faside>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  data = buildData();\n  state = {\n    selectedEntityId: 'northwind',\n    selectedMeetingId: 'nw-q2',\n    activeCat: 'all',\n    search: '',\n    statuses: seedStatuses(buildData())\n  };\n\n  // ---- helpers ----\n  fmtLong(iso){const M=['January','February','March','April','May','June','July','August','September','October','November','December'];const d=new Date(iso+'T00:00:00');return d.getDate()+' '+M[d.getMonth()]+' '+d.getFullYear();}\n  fmtShort(iso){const M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const d=new Date(iso+'T00:00:00');return d.getDate()+' '+M[d.getMonth()];}\n  avatarColor(s){const p=['#2f6bdd','#4f74a8','#5b8c8a','#6a6fb0','#7a86a0','#3f8f8a','#8a6fa8'];let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return p[h%p.length];}\n  initials(name){const w=name.trim().split(/\\s+/);return (w[0][0]+(w[1]?w[1][0]:'')).toUpperCase();}\n\n  baseAvatar(name,type){\n    const r = type==='person' ? '50%' : '9px';\n    return `width:34px;height:34px;flex:none;border-radius:${r};background:${this.avatarColor(name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:700`;\n  }\n\n  tabStyle(cat){\n    const on = this.state.activeCat===cat;\n    return `flex:1;padding:6px 4px;border:none;border-radius:8px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;`+\n      (on ? 'background:#fff;color:#1b2230;box-shadow:0 1px 2px rgba(30,50,90,.12)' : 'background:transparent;color:#7a86a0');\n  }\n\n  filteredEntities(){\n    const q = this.state.search.trim().toLowerCase();\n    return this.data.filter(e=>{\n      if(this.state.activeCat!=='all' && e.category!==this.state.activeCat) return false;\n      if(!q) return true;\n      if(e.name.toLowerCase().includes(q) || e.meta.toLowerCase().includes(q)) return true;\n      return e.meetings.some(m=>m.title.toLowerCase().includes(q));\n    });\n  }\n\n  getEntity(id){return this.data.find(e=>e.id===id) || this.data[0];}\n\n  renderVals(){\n    const ents = this.filteredEntities();\n    const selEnt = this.getEntity(this.state.selectedEntityId);\n    const meetings = selEnt.meetings.slice().sort((a,b)=>b.date.localeCompare(a.date));\n    let selMeeting = meetings.find(m=>m.id===this.state.selectedMeetingId) || meetings[0];\n\n    // entity rows\n    const entities = ents.map(e=>{\n      const sel = e.id===selEnt.id;\n      return {\n        name:e.name, meta:e.meta, initials:this.initials(e.name), meetingCount:e.meetings.length,\n        onSelect:()=>{const first=e.meetings.slice().sort((a,b)=>b.date.localeCompare(a.date))[0];this.setState({selectedEntityId:e.id, selectedMeetingId:first?first.id:null});},\n        avatarStyle:this.baseAvatar(e.name,e.type),\n        nameStyle:`font-size:14px;font-weight:${sel?700:500};color:#222b3a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px`,\n        rowStyle:`display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:11px;cursor:pointer;margin-bottom:2px;border-left:3px solid ${sel?'#2f6bdd':'transparent'};background:${sel?'#fff':'transparent'};box-shadow:${sel?'0 1px 2px rgba(30,50,90,.08)':'none'}`,\n        badgeStyle:`flex:none;min-width:20px;height:20px;padding:0 6px;border-radius:7px;background:${sel?'#e7f0fd':'#e3e8ef'};color:${sel?'#2f6bdd':'#aab3c1'};font-size:11.5px;font-weight:600;display:flex;align-items:center;justify-content:center`\n      };\n    });\n\n    // meeting list rows\n    const mRows = meetings.map(m=>{\n      const sel = selMeeting && m.id===selMeeting.id;\n      const open = m.actions.filter(a=>this.state.statuses[a.id]!=='completed').length;\n      return {\n        title:m.title, dateLabel:this.fmtLong(m.date), attendeesLabel:this.attLabel(m.attendees),\n        onSelect:()=>this.setState({selectedMeetingId:m.id}),\n        openLabel: open>0 ? open+' open' : 'Done',\n        openPillStyle: open>0\n          ? 'flex:none;padding:2px 8px;border-radius:7px;background:#e7f0fd;color:#2f6bdd;font-size:11px;font-weight:600'\n          : 'flex:none;padding:2px 8px;border-radius:7px;background:#e4f3ec;color:#2f9e6f;font-size:11px;font-weight:600',\n        rowStyle:`padding:13px 14px;border-radius:13px;cursor:pointer;margin-bottom:6px;border:1px solid ${sel?'#c4dafb':'#eef2f7'};background:${sel?'#f4f8fe':'#fff'};box-shadow:${sel?'0 1px 3px rgba(30,70,160,.08)':'none'}`\n      };\n    });\n\n    // detail attendee avatars (overlapping)\n    const attAvatars = selMeeting.attendees.slice(0,5).map((n,i)=>({\n      initials:this.initials(n),\n      style:`width:28px;height:28px;border-radius:50%;background:${this.avatarColor(n)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:700;border:2px solid #fff;margin-left:${i===0?0:-9}px`\n    }));\n\n    // action groups by person\n    const order=[]; const map={};\n    selMeeting.actions.forEach(a=>{\n      if(!map[a.person]){map[a.person]={person:a.person,role:a.role,items:[]};order.push(a.person);}\n      const completed = this.state.statuses[a.id]==='completed';\n      const today = new Date(); today.setHours(0,0,0,0);\n      const overdue = !completed && a.due && new Date(a.due+'T00:00:00') < today;\n      let statusLabel, statusColor;\n      if(completed){statusLabel='Completed'; statusColor='#2f9e6f';}\n      else if(overdue){statusLabel='Overdue · '+this.fmtShort(a.due); statusColor='#d6494e';}\n      else if(a.due){statusLabel='Due '+this.fmtShort(a.due); statusColor='#9aa4b3';}\n      else {statusLabel='Open'; statusColor='#9aa4b3';}\n      map[a.person].items.push({\n        text:a.text, completed,\n        statusLabel,\n        statusStyle:`font-size:11.5px;font-weight:${overdue?600:500};color:${statusColor};margin-top:3px`,\n        textStyle:`font-size:13.5px;line-height:1.45;color:${completed?'#aab3c1':'#2f3947'};${completed?'text-decoration:line-through':''}`,\n        boxStyle:`width:20px;height:20px;flex:none;border-radius:6px;margin-top:1px;display:flex;align-items:center;justify-content:center;`+\n          (completed?'background:#2f9e6f;border:1px solid #2f9e6f':'background:#fff;border:1.6px solid #cdd6e2'),\n        onToggle:()=>this.setState(s=>({statuses:{...s.statuses,[a.id]:s.statuses[a.id]==='completed'?'open':'completed'}}))\n      });\n    });\n    const actionGroups = order.map(p=>({\n      person:map[p].person, role:map[p].role, initials:this.initials(map[p].person),\n      avatarStyle:`width:30px;height:30px;flex:none;border-radius:50%;background:${this.avatarColor(map[p].person)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:700`,\n      items:map[p].items\n    }));\n\n    const allActs = selMeeting.actions;\n    const completedCount = allActs.filter(a=>this.state.statuses[a.id]==='completed').length;\n\n    return {\n      search:this.state.search,\n      onSearch:e=>this.setState({search:e.target.value}),\n      entityCount: ents.length,\n      setCatAll:()=>this.setState({activeCat:'all'}),\n      setCatBiz:()=>this.setState({activeCat:'business'}),\n      setCatPersonal:()=>this.setState({activeCat:'personal'}),\n      tabAllStyle:this.tabStyle('all'),\n      tabBizStyle:this.tabStyle('business'),\n      tabPersonalStyle:this.tabStyle('personal'),\n      entities,\n      selectedEntity:{name:selEnt.name, meta:selEnt.meta, initials:this.initials(selEnt.name), avatarStyle:this.baseAvatar(selEnt.name,selEnt.type)},\n      meetingsCountLabel: selEnt.meetings.length+' meeting'+(selEnt.meetings.length===1?'':'s'),\n      meetings:mRows,\n      selectedMeeting:{\n        title:selMeeting.title, dateLabel:this.fmtLong(selMeeting.date),\n        attendeesLabel:this.attLabel(selMeeting.attendees),\n        summary:selMeeting.summary, notes:selMeeting.notes,\n        attendeeAvatars:attAvatars,\n        avatarsStyle:'display:flex;align-items:center'\n      },\n      actionGroups,\n      openCount: allActs.length-completedCount,\n      completedCount\n    };\n  }\n\n  attLabel(att){\n    if(att.length<=2) return att.join(', ');\n    return att.slice(0,2).join(', ')+' +'+(att.length-2);\n  }\n}\n\nfunction seedStatuses(data){const m={};data.forEach(e=>e.meetings.forEach(mt=>mt.actions.forEach(a=>{m[a.id]=a.status;})));return m;}\n\nfunction buildData(){\n  return [\n    {id:'northwind',name:'Northwind Trading',type:'company',category:'business',meta:'Logistics · 8 contacts',meetings:[\n      {id:'nw-q2',date:'2026-06-12',title:'Q2 Logistics & Carrier Review',attendees:['You','Marcus Reed','Priya Nair','Dana Whitlock'],\n        summary:['We reviewed Q2 carrier performance against the renegotiated SLAs. On-time delivery climbed to 94.2%, but two coastal lanes continued to underperform and are dragging the regional average. The team agreed that consolidating those lanes under a single carrier is the most viable path before peak season.',\n          'Priya presented an updated cost model showing a projected 6% freight savings if renewals close before the end of June. Marcus will lead the carrier negotiations, with a revised SLA draft circulating to all parties this week. We close on a decision at the next sync.'],\n        notes:['Dana flagged that the new WMS rollout may shift KPI baselines — revisit metrics in July.','Peak-season capacity buffer should be locked by mid-July at the latest.'],\n        actions:[\n          {id:'nwq2-1',person:'You',role:'Account lead',text:'Send revised SLA draft to all carriers',due:'2026-06-24',status:'open'},\n          {id:'nwq2-2',person:'Marcus Reed',role:'Ops director',text:'Finalize carrier contract renewals',due:'2026-06-27',status:'open'},\n          {id:'nwq2-3',person:'Marcus Reed',role:'Ops director',text:'Flag underperforming coastal lanes for Q3',due:'2026-06-16',status:'open'},\n          {id:'nwq2-4',person:'Priya Nair',role:'Finance',text:'Share updated freight cost model',due:null,status:'completed'},\n          {id:'nwq2-5',person:'Dana Whitlock',role:'Warehouse',text:'Circulate latest warehouse KPIs',due:null,status:'completed'}\n        ]},\n      {id:'nw-auto',date:'2026-05-04',title:'Warehouse Automation Kickoff',attendees:['You','Priya Nair','Sam Ortiz'],\n        summary:['Kicked off the automation initiative for the Reno distribution center. Sam walked through three vendor proposals; the team favored a phased pick-and-pack rollout to limit downtime during the transition.',\n          'Budget approval is pending a final ROI memo. Priya will model the payback period under conservative throughput assumptions before we commit.'],\n        notes:['Vendor demos scheduled for the last week of May.'],\n        actions:[\n          {id:'nwa-1',person:'Sam Ortiz',role:'Automation',text:'Shortlist two vendors for on-site demo',due:'2026-05-22',status:'completed'},\n          {id:'nwa-2',person:'Priya Nair',role:'Finance',text:'Draft ROI memo for budget approval',due:'2026-05-30',status:'completed'},\n          {id:'nwa-3',person:'You',role:'Account lead',text:'Confirm downtime window with operations',due:'2026-05-28',status:'completed'}\n        ]},\n      {id:'nw-renew',date:'2026-03-18',title:'Annual Contract Renewal',attendees:['You','Marcus Reed'],\n        summary:['Annual master services agreement reviewed and renewed for another 24-month term. Pricing held flat with an added volume-discount tier above 10,000 units per quarter.',\n          'Legal redlines were minor and resolved on the call. Signed copies to follow.'],\n        notes:['Volume tier kicks in automatically once threshold is hit — no amendment needed.'],\n        actions:[\n          {id:'nwr-1',person:'Marcus Reed',role:'Ops director',text:'Countersign and file the renewed MSA',due:null,status:'completed'},\n          {id:'nwr-2',person:'You',role:'Account lead',text:'Update CRM with new contract terms',due:null,status:'completed'}\n        ]}\n    ]},\n    {id:'atlas',name:'Atlas Robotics',type:'company',category:'business',meta:'Manufacturing · 5 contacts',meetings:[\n      {id:'at-pilot',date:'2026-06-09',title:'Pilot Deployment Sync',attendees:['You','Elena Park','Toby Grant'],\n        summary:['The pilot cell has been running for three w
